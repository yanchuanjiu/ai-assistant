[pytest]
# AI 助理项目测试配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 自定义标签（避免 PytestUnknownMarkWarning）
markers =
    smoke: 冒烟测试，每次推送必跑（< 2min）
    color_basic: 色值还原基础用例
    color_boundary: 色值边界/异常用例
    stream_spec: 推流规格合规检查
    reliability: 稳定性/重试/熔断测试
    lipsync: 嘴形同步检测
    cross_platform: 跨平台一致性
    model_monitor: 模型性能监控
    docker: 容器化测试（需 Docker 环境）
    regression: 回归防守（精度/行为不得倒退）
    api: API 集成测试（需外部服务）
    batch: 批量场景测试
    accuracy: 准确率指标测试
    boundary: 边界值测试
    degradation: 降级/容错测试
    performance: 性能/时延测试
    concurrency: 并发/隔离测试
    environment: 环境检测测试
    consistency: 一致性测试

# 输出配置
addopts = -v --tb=short
log_cli = true
log_cli_level = INFO
